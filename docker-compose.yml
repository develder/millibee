services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query)
  #   docker compose run --rm picoclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  picoclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picoclaw-agent
    profiles:
      - agent
    networks:
      - picoclaw-net
    volumes:
      - ./config/config.json:/home/picoclaw/.picoclaw/config.json:ro
      - picoclaw-workspace:/home/picoclaw/.picoclaw/workspace
      # Memory vault: bind mount zodat het buiten de container beschikbaar is
      - ${MEMORY_VAULT_PATH:-./data/memory}:/home/picoclaw/.picoclaw/workspace/memory
    environment:
      - CRAWL4AI_BASE_URL=http://crawl4ai:11235
    command: ["agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot)
  #   docker compose up picoclaw-gateway
  # ─────────────────────────────────────────────
  picoclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picoclaw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    networks:
      - picoclaw-net
    volumes:
      - ./config/config.json:/home/picoclaw/.picoclaw/config.json:ro
      - picoclaw-workspace:/home/picoclaw/.picoclaw/workspace
      # Memory vault: bind mount zodat het buiten de container beschikbaar is
      - ${MEMORY_VAULT_PATH:-./data/memory}:/home/picoclaw/.picoclaw/workspace/memory
    environment:
      - CRAWL4AI_BASE_URL=http://crawl4ai:11235
    command: ["gateway"]

  # ─────────────────────────────────────────────
  # Crawl4AI (Deep Scraper)
  #   LLM-ready web scraping service
  #   API: http://crawl4ai:11235
  #   Playground: http://localhost:11235/playground
  # ─────────────────────────────────────────────
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    networks:
      - picoclaw-net
    ports:
      # Optioneel: expose op host voor debugging / playground
      - "${CRAWL4AI_HOST_PORT:-11235}:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-}
      - MAX_CONCURRENT_TASKS=${CRAWL4AI_MAX_CONCURRENT:-5}
    volumes:
      - crawl4ai-data:/root/.crawl4ai
    # Chromium heeft shared memory nodig
    shm_size: '1gb'

networks:
  picoclaw-net:
    driver: bridge

volumes:
  picoclaw-workspace:
  crawl4ai-data:
