services:
  # ─────────────────────────────────────────────
  # MilliBee Agent (one-shot query)
  #   docker compose run --rm millibee-agent -m "Hello"
  # ─────────────────────────────────────────────
  millibee-agent:
    env_file:
      - path: .env
        required: false
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: millibee-agent
    profiles:
      - agent
    networks:
      - millibee-net
    volumes:
      - ../config/config.json:/home/millibee/.millibee/config.json:ro
      - millibee-workspace:/home/millibee/.millibee/workspace
      # Memory vault: bind mount so it's accessible outside the container
      - ${MEMORY_VAULT_PATH:-../data/memory}:/home/millibee/.millibee/workspace/memory
    environment:
      - CRAWL4AI_BASE_URL=http://crawl4ai:11235
      - YT_TRANSCRIPT_URL=http://yt-transcript:8000
      - WHISPER_ASR_URL=http://whisper-asr:9000
    command: ["agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # MilliBee Gateway (Long-running Bot)
  #   docker compose up millibee-gateway
  # ─────────────────────────────────────────────
  millibee-gateway:
    env_file:
      - path: .env
        required: false
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: millibee-gateway
    restart: unless-stopped
    profiles:
      - gateway
    networks:
      - millibee-net
    volumes:
      - ../config/config.json:/home/millibee/.millibee/config.json:ro
      - millibee-workspace:/home/millibee/.millibee/workspace
      # Memory vault: bind mount so it's accessible outside the container
      - ${MEMORY_VAULT_PATH:-../data/memory}:/home/millibee/.millibee/workspace/memory
    ports:
      - "${SSH_HOST_PORT:-2222}:2222"
    environment:
      - CRAWL4AI_BASE_URL=http://crawl4ai:11235
      - YT_TRANSCRIPT_URL=http://yt-transcript:8000
      - WHISPER_ASR_URL=http://whisper-asr:9000
    command: ["gateway"]

  # ─────────────────────────────────────────────
  # Crawl4AI (Deep Scraper)
  #   LLM-ready web scraping service
  #   API: http://crawl4ai:11235
  #   Playground: http://localhost:11235/playground
  # ─────────────────────────────────────────────
  crawl4ai:
    env_file:
      - path: .env
        required: false
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    networks:
      - millibee-net
    ports:
      # Optional: expose on host for debugging / playground
      - "${CRAWL4AI_HOST_PORT:-11235}:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-}
      - MAX_CONCURRENT_TASKS=${CRAWL4AI_MAX_CONCURRENT:-5}
    volumes:
      - crawl4ai-data:/root/.crawl4ai
    # Chromium needs shared memory
    shm_size: '1gb'

  # ─────────────────────────────────────────────
  # YouTube Transcript API
  #   Extracts existing captions/subtitles from YouTube videos
  #   API: http://yt-transcript:8000
  # ─────────────────────────────────────────────
  yt-transcript:
    env_file:
      - path: .env
        required: false
    image: yoanbernabeu/youtubetranscriptapi:latest
    container_name: yt-transcript
    restart: unless-stopped
    networks:
      - millibee-net
    ports:
      - "${YT_TRANSCRIPT_HOST_PORT:-8200}:8000"

  # ─────────────────────────────────────────────
  # Whisper ASR (Speech-to-Text)
  #   Transcribes audio files using Faster Whisper
  #   API: http://whisper-asr:9000
  #   Docs: http://localhost:9000/docs
  # ─────────────────────────────────────────────
  whisper-asr:
    env_file:
      - path: .env
        required: false
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-asr
    restart: unless-stopped
    networks:
      - millibee-net
    ports:
      - "${WHISPER_HOST_PORT:-9000}:9000"
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-base}
      - ASR_ENGINE=faster_whisper
    volumes:
      - whisper-cache:/root/.cache

networks:
  millibee-net:
    driver: bridge

volumes:
  millibee-workspace:
  crawl4ai-data:
  whisper-cache:
